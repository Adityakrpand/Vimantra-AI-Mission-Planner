name: Backend

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Pytest
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --basetemp=pytest-tmp-run
